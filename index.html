<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trainingsplan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#000;color:#e8e8e8;min-height:100vh;-webkit-tap-highlight-color:transparent;padding-bottom:40px}

/* Timer Bar */
#timer-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:100;background:#181818;border-bottom:1px solid #444;padding:12px 16px;text-align:center}
#timer-bar.active{display:block}
#timer-bar.flash{background:#fff;color:#000}
#timer-time{font-size:2.4rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.03em}
#timer-label{font-size:0.75rem;color:#aaa;margin-top:2px}
#timer-bar.flash #timer-label{color:#555}
#timer-btns{display:flex;gap:8px;justify-content:center;margin-top:8px}
#timer-btns button{background:#333;border:1px solid #555;color:#eee;padding:6px 14px;border-radius:6px;font-size:0.8rem;font-family:inherit;cursor:pointer}
#timer-bar.flash #timer-btns button{background:#ddd;color:#000;border-color:#bbb}

/* Header */
header{padding:16px 16px 0;position:sticky;top:0;z-index:50;background:#000}
body.timer-active header{top:110px}
h1{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:12px;letter-spacing:-0.02em}
.tabs{display:flex;gap:4px;background:#111;border-radius:10px;padding:3px}
.tab{flex:1;padding:10px 0;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;background:transparent;color:#999;font-family:inherit;transition:background .1s,color .1s}
.tab.active{background:#fff;color:#000}

/* Session */
.session{padding:16px 16px 8px;text-align:center}
.session-btn{background:#fff;color:#000;border:none;padding:12px 28px;border-radius:10px;font-size:0.95rem;font-weight:600;font-family:inherit;cursor:pointer}
.session-btn.running{background:#444;color:#fff}
.session-clock{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;margin-top:8px}
.session-history{margin-top:10px;font-size:0.75rem;color:#999;line-height:1.8}

/* Exercises */
.exercises{padding:8px 12px}
.exercise{background:#111;border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:8px;position:relative}
.exercise.dragging{opacity:0.4}
.ex-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.drag-handle{color:#777;font-size:1.2rem;cursor:grab;touch-action:none;padding:4px;user-select:none;line-height:1}
.drag-handle:active{cursor:grabbing}
.ex-name{flex:1;background:none;border:none;color:#e8e8e8;font-size:1rem;font-weight:600;font-family:inherit;padding:0;min-width:0}
.ex-name:focus{outline:none;color:#fff}
.ex-del{background:none;border:none;color:#666;font-size:1.3rem;cursor:pointer;padding:0 2px;line-height:1}
.ex-del:active{color:#bbb}
.ex-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:2px}
.field label{font-size:0.6rem;text-transform:uppercase;color:#999;letter-spacing:0.06em;font-weight:500}
.field input{background:#1a1a1a;border:1px solid #444;border-radius:6px;color:#eee;font-size:0.9rem;padding:8px 6px;font-family:inherit;width:100%;text-align:center}
.field input:focus{outline:none;border-color:#777;color:#fff}

/* Sets */
.ex-sets{display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap}
.set-group{display:flex;flex-direction:column;align-items:center;gap:4px}
.set-label{font-size:0.55rem;text-transform:uppercase;color:#666;font-weight:500;letter-spacing:0.04em}
.set-cb{-webkit-appearance:none;appearance:none;width:42px;height:42px;border:2px solid #555;border-radius:8px;background:#1a1a1a;cursor:pointer;position:relative;flex-shrink:0}
.set-cb:checked{background:#fff;border-color:#fff}
.set-cb:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#000;font-size:1.2rem;font-weight:700}
.set-reps{width:42px;background:#1a1a1a;border:1px solid #444;border-radius:6px;color:#eee;font-size:0.85rem;padding:5px 2px;font-family:inherit;text-align:center}
.set-reps:focus{outline:none;border-color:#777;color:#fff}
.set-reps::placeholder{color:#555}
.set-kg{width:42px;background:#0f0f0f;border:1px solid #333;border-radius:6px;color:#bbb;font-size:0.7rem;padding:4px 2px;font-family:inherit;text-align:center}
.set-kg:focus{outline:none;border-color:#777;color:#fff}
.set-kg::placeholder{color:#444}
.set-btns{display:flex;gap:4px;margin-left:auto}
.set-btn{background:#1a1a1a;border:1px solid #555;color:#bbb;width:32px;height:32px;border-radius:6px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.set-btn:active{background:#333;color:#fff}

/* Add / Reset */
.add-btn{display:block;width:100%;padding:14px;margin-top:4px;background:#111;border:1px dashed #555;border-radius:12px;color:#999;font-size:0.85rem;font-family:inherit;cursor:pointer}
.add-btn:active{background:#222}
.reset-btn{display:block;width:100%;padding:12px;margin-top:12px;background:none;border:1px solid #444;border-radius:10px;color:#999;font-size:0.8rem;font-family:inherit;cursor:pointer}
.reset-btn:active{background:#222;color:#ccc}

/* Drag placeholder */
.drag-ghost{position:fixed;z-index:200;pointer-events:none;opacity:0.85;border:1px solid #444;border-radius:12px}
.drag-placeholder{border:1px dashed #333;border-radius:12px;margin-bottom:8px;background:#050505}
</style>
</head>
<body>

<div id="timer-bar">
  <div id="timer-time">0s</div>
  <div id="timer-label"></div>
  <div id="timer-btns">
    <button onclick="timerAdjust(-10)">−10s</button>
    <button onclick="timerStop()">Stop</button>
    <button onclick="timerAdjust(10)">+10s</button>
  </div>
</div>

<header>
  <h1>Trainingsplan</h1>
  <div class="tabs" id="tabs"></div>
</header>

<main id="main"></main>

<script>
// ── Storage Keys ──
const K = 'tp7';
const KD = K+'_data', KT = K+'_tab', KC = K+'_checks', KS = K+'_session', KH = K+'_history', KR = K+'_timer';

// ── Default Data ──
const DEFAULTS = {
  push: [
    {name:'Incline DB Bench',kg:'24',sets:3,pause:'120'},
    {name:'Machine Flys',kg:'80',sets:3,pause:'90'},
    {name:'Shoulder Press',kg:'35',sets:3,pause:'120'},
    {name:'Cable Lateral Raise (unilateral)',kg:'5',sets:3,pause:'60'},
    {name:'Overhead Triceps Extension',kg:'16.25',sets:3,pause:'90'},
    {name:'Triceps Pushdown',kg:'80',sets:3,pause:'60'}
  ],
  pull: [
    {name:'Pull-ups',kg:'BW',sets:3,pause:'120'},
    {name:'Lat Pulldown weit',kg:'72.5',sets:3,pause:'90'},
    {name:'Kabelrudern eng',kg:'65',sets:3,pause:'120'},
    {name:'Low Rows',kg:'32.5',sets:3,pause:'90'},
    {name:'Face Pulls',kg:'16.25',sets:3,pause:'60'},
    {name:'Preacher Curls',kg:'55.5',sets:3,pause:'90'},
    {name:'Hammer Curls',kg:'12',sets:3,pause:'60'}
  ],
  legs: [
    {name:'Beinpresse',kg:'77.5',sets:3,pause:'120'},
    {name:'Romanian Deadlifts',kg:'40',sets:3,pause:'120'},
    {name:'Leg Extensions',kg:'82.5',sets:3,pause:'90'},
    {name:'Seated Leg Curl',kg:'80',sets:3,pause:'90'},
    {name:'Hanging Leg Raises',kg:'-',sets:3,pause:'60'},
    {name:'Crunches',kg:'-',sets:3,pause:'60'}
  ]
};

// ── State ──
function loadJSON(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let data = loadJSON(KD, null);
if (!data) { data = JSON.parse(JSON.stringify(DEFAULTS)); saveJSON(KD, data); }
// Ensure sets is always a number
for (const day of ['push','pull','legs']) {
  for (const ex of data[day]) { ex.sets = parseInt(ex.sets) || 3; }
}

let activeTab = localStorage.getItem(KT) || 'push';
let checks = loadJSON(KC, { push: [], pull: [], legs: [] });
let history = loadJSON(KH, { push: [], pull: [], legs: [] });
let sessionInfo = loadJSON(KS, null);
let timerInfo = loadJSON(KR, null);

function saveData() { saveJSON(KD, data); }
function saveChecks() { saveJSON(KC, checks); }
function saveHistory() { saveJSON(KH, history); }
function saveSession(v) { sessionInfo = v; if (v) saveJSON(KS, v); else localStorage.removeItem(KS); }
function saveTimer(v) { timerInfo = v; if (v) saveJSON(KR, v); else localStorage.removeItem(KR); }

// Ensure checks arrays match exercise counts, using {done, reps} objects
function syncChecks(dayId) {
  if (!checks[dayId]) checks[dayId] = [];
  const exs = data[dayId];
  while (checks[dayId].length < exs.length) checks[dayId].push([]);
  checks[dayId].length = exs.length;
  for (let i = 0; i < exs.length; i++) {
    if (!Array.isArray(checks[dayId][i])) checks[dayId][i] = [];
    const s = exs[i].sets;
    // Migrate old boolean format to {done, reps}
    for (let j = 0; j < checks[dayId][i].length; j++) {
      const v = checks[dayId][i][j];
      if (typeof v === 'boolean') checks[dayId][i][j] = { done: v, reps: '', kg: '' };
      else if (!v || typeof v !== 'object') checks[dayId][i][j] = { done: false, reps: '', kg: '' };
      else if (!('kg' in v)) v.kg = '';
    }
    while (checks[dayId][i].length < s) checks[dayId][i].push({ done: false, reps: '', kg: '' });
    checks[dayId][i].length = s;
  }
}

// ── Audio ──
let audioCtx = null;
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 880;
    o.type = 'sine';
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    o.start(); o.stop(audioCtx.currentTime + 0.3);
  } catch {}
}

// ── Rest Timer ──
let timerInterval = null;

function timerStart(seconds, exerciseName) {
  // Ensure audio context is ready
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  timerStop(true);
  const endTime = Date.now() + seconds * 1000;
  saveTimer({ endTime, exerciseName });
  timerTick();
  timerInterval = setInterval(timerTick, 200);
  document.body.classList.add('timer-active');
}

function timerTick() {
  if (!timerInfo) return;
  const remaining = Math.max(0, Math.ceil((timerInfo.endTime - Date.now()) / 1000));
  const bar = document.getElementById('timer-bar');
  const timeEl = document.getElementById('timer-time');
  const labelEl = document.getElementById('timer-label');

  bar.classList.add('active');
  timeEl.textContent = remaining + 's';
  labelEl.textContent = timerInfo.exerciseName;

  if (remaining <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    beep();
    bar.classList.add('flash');
    setTimeout(() => {
      bar.classList.remove('flash', 'active');
      document.body.classList.remove('timer-active');
      saveTimer(null);
    }, 2000);
  }
}

function timerStop(silent) {
  clearInterval(timerInterval);
  timerInterval = null;
  const bar = document.getElementById('timer-bar');
  bar.classList.remove('active', 'flash');
  document.body.classList.remove('timer-active');
  saveTimer(null);
}

function timerAdjust(secs) {
  if (!timerInfo) return;
  timerInfo.endTime += secs * 1000;
  saveTimer(timerInfo);
  timerTick();
}

// Resume timer on load
function timerResume() {
  if (!timerInfo) return;
  if (timerInfo.endTime > Date.now()) {
    timerTick();
    timerInterval = setInterval(timerTick, 200);
    document.body.classList.add('timer-active');
  } else {
    // Expired while away
    saveTimer(null);
  }
}

// ── Session Stopwatch ──
let sessionInterval = null;

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function sessionTick() {
  if (!sessionInfo || sessionInfo.dayId !== activeTab) return;
  const el = document.getElementById('session-clock');
  if (el) el.textContent = formatDuration(Date.now() - sessionInfo.startTime);
}

function sessionToggle() {
  if (sessionInfo && sessionInfo.dayId === activeTab) {
    // Stop
    const duration = Date.now() - sessionInfo.startTime;
    clearInterval(sessionInterval);
    sessionInterval = null;
    if (!history[activeTab]) history[activeTab] = [];
    history[activeTab].unshift({ date: new Date().toLocaleDateString('de-DE'), duration });
    if (history[activeTab].length > 5) history[activeTab].length = 5;
    saveHistory();
    saveSession(null);
  } else {
    // Start
    clearInterval(sessionInterval);
    saveSession({ dayId: activeTab, startTime: Date.now() });
    sessionInterval = setInterval(sessionTick, 500);
  }
  render();
}

function sessionResume() {
  if (sessionInfo) {
    sessionInterval = setInterval(sessionTick, 500);
  }
}

// ── Drag & Drop ──
let drag = null;

function dragStart(e, dayId, idx) {
  e.preventDefault();
  const card = e.target.closest('.exercise');
  if (!card) return;
  const container = card.parentElement;
  const cards = [...container.querySelectorAll('.exercise')];
  const rects = cards.map(c => ({ top: c.offsetTop, height: c.offsetHeight }));
  const rect = card.getBoundingClientRect();

  // Create ghost
  const ghost = card.cloneNode(true);
  ghost.className = 'exercise drag-ghost';
  ghost.style.top = rect.top + 'px';
  ghost.style.left = rect.left + 'px';
  ghost.style.width = rect.width + 'px';
  document.body.appendChild(ghost);

  // Create placeholder
  const ph = document.createElement('div');
  ph.className = 'drag-placeholder';
  ph.style.height = rect.height + 'px';
  container.insertBefore(ph, card);

  card.classList.add('dragging');

  drag = { dayId, idx, card, ghost, ph, container, cards, rects, startY: e.clientY, ghostTop: rect.top, pointerY: e.clientY };

  e.target.setPointerCapture(e.pointerId);
  document.addEventListener('pointermove', dragMove);
  document.addEventListener('pointerup', dragEnd);
}

function dragMove(e) {
  if (!drag) return;
  e.preventDefault();
  const dy = e.clientY - drag.startY;
  drag.ghost.style.top = (drag.ghostTop + dy) + 'px';
  drag.pointerY = e.clientY;

  // Determine placeholder position based on scroll-adjusted Y
  const containerRect = drag.container.getBoundingClientRect();
  const localY = e.clientY - containerRect.top;

  const items = [...drag.container.querySelectorAll('.exercise:not(.dragging)')];
  let insertBefore = null;
  for (const item of items) {
    const itemTop = item.offsetTop - drag.container.offsetTop;
    const itemMid = item.getBoundingClientRect().top + item.offsetHeight / 2;
    if (e.clientY < itemMid) { insertBefore = item; break; }
  }
  if (insertBefore) {
    drag.container.insertBefore(drag.ph, insertBefore);
  } else {
    // After the add button? Insert before add button
    const addBtn = drag.container.querySelector('.add-btn');
    if (addBtn) drag.container.insertBefore(drag.ph, addBtn);
  }
}

function dragEnd(e) {
  if (!drag) return;
  document.removeEventListener('pointermove', dragMove);
  document.removeEventListener('pointerup', dragEnd);

  // Determine new index from placeholder position
  const allEls = [...drag.container.children];
  const exerciseEls = allEls.filter(el => el.classList.contains('exercise') || el.classList.contains('drag-placeholder'));
  let newIdx = 0;
  for (let i = 0; i < exerciseEls.length; i++) {
    if (exerciseEls[i] === drag.ph) { newIdx = i; break; }
  }
  // Adjust: if original was before placeholder in DOM, the count of exercises before placeholder doesn't include the dragged one
  // Actually, dragged card is still in DOM with .dragging class, and placeholder is also there
  // So exerciseEls includes both. Let's count only non-dragging exercises and the placeholder
  const filtered = allEls.filter(el => (el.classList.contains('exercise') && !el.classList.contains('dragging')) || el.classList.contains('drag-placeholder'));
  newIdx = filtered.indexOf(drag.ph);

  // Cleanup DOM
  drag.ghost.remove();
  drag.ph.remove();
  drag.card.classList.remove('dragging');

  const { dayId, idx } = drag;
  drag = null;

  if (idx !== newIdx && newIdx >= 0) {
    const [ex] = data[dayId].splice(idx, 1);
    data[dayId].splice(newIdx, 0, ex);
    syncChecks(dayId);
    const [ch] = checks[dayId].splice(idx, 1);
    // Need to re-sync after splice since lengths changed
    checks[dayId].splice(newIdx, 0, ch);
    saveData();
    saveChecks();
  }
  render();
}

// ── Render ──
function render() {
  const days = ['push', 'pull', 'legs'];
  const labels = { push: 'Push', pull: 'Pull', legs: 'Legs' };

  // Tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  for (const d of days) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (activeTab === d ? ' active' : '');
    btn.textContent = labels[d];
    btn.onclick = () => { activeTab = d; localStorage.setItem(KT, d); render(); };
    tabsEl.appendChild(btn);
  }

  // Main content
  const main = document.getElementById('main');
  main.innerHTML = '';

  const dayId = activeTab;
  syncChecks(dayId);

  // Session area
  const sessionDiv = document.createElement('div');
  sessionDiv.className = 'session';
  const isRunning = sessionInfo && sessionInfo.dayId === dayId;

  const sessionBtn = document.createElement('button');
  sessionBtn.className = 'session-btn' + (isRunning ? ' running' : '');
  sessionBtn.textContent = isRunning ? 'Training beenden' : 'Training starten';
  sessionBtn.onclick = sessionToggle;
  sessionDiv.appendChild(sessionBtn);

  if (isRunning) {
    const clock = document.createElement('div');
    clock.className = 'session-clock';
    clock.id = 'session-clock';
    clock.textContent = formatDuration(Date.now() - sessionInfo.startTime);
    sessionDiv.appendChild(clock);
  }

  // History
  if (history[dayId] && history[dayId].length > 0) {
    const hist = document.createElement('div');
    hist.className = 'session-history';
    hist.innerHTML = history[dayId].map(h => `${h.date} – ${formatDuration(h.duration)}`).join('<br>');
    sessionDiv.appendChild(hist);
  }

  main.appendChild(sessionDiv);

  // Exercise list
  const exList = document.createElement('div');
  exList.className = 'exercises';
  exList.id = 'exercise-list';

  data[dayId].forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'exercise';
    card.dataset.idx = i;

    // Top row: drag handle, name, delete
    const top = document.createElement('div');
    top.className = 'ex-top';

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.textContent = '⠿';
    handle.onpointerdown = (e) => dragStart(e, dayId, i);

    const nameInp = document.createElement('input');
    nameInp.className = 'ex-name';
    nameInp.type = 'text';
    nameInp.value = ex.name;
    nameInp.oninput = () => { ex.name = nameInp.value; saveData(); };

    const del = document.createElement('button');
    del.className = 'ex-del';
    del.textContent = '×';
    del.onclick = () => {
      if (data[dayId].length <= 1) return;
      data[dayId].splice(i, 1);
      checks[dayId].splice(i, 1);
      saveData(); saveChecks(); render();
    };

    top.appendChild(handle);
    top.appendChild(nameInp);
    top.appendChild(del);
    card.appendChild(top);

    // Fields
    const fields = document.createElement('div');
    fields.className = 'ex-fields';
    const fieldDefs = [
      ['kg', 'Gewicht', ex.kg, 'text'],
      ['sets', 'Sätze', ex.sets, 'number'],
      ['pause', 'Pause (s)', ex.pause, 'text']
    ];

    for (const [key, label, val, type] of fieldDefs) {
      const f = document.createElement('div');
      f.className = 'field';
      const l = document.createElement('label');
      l.textContent = label;
      const inp = document.createElement('input');
      inp.type = type === 'number' ? 'number' : 'text';
      inp.inputMode = type === 'number' ? 'numeric' : (key === 'pause' || key === 'kg' ? 'decimal' : 'text');
      inp.value = val;
      if (type === 'number') { inp.min = '1'; inp.max = '20'; }
      inp.oninput = () => {
        if (key === 'sets') {
          ex.sets = Math.max(1, Math.min(20, parseInt(inp.value) || 1));
          syncChecks(dayId);
          saveData(); saveChecks();
          renderSets(setsRow, dayId, i, ex);
        } else {
          ex[key] = inp.value;
          saveData();
        }
      };
      f.appendChild(l);
      f.appendChild(inp);
      fields.appendChild(f);
    }
    card.appendChild(fields);

    // Sets row (checkboxes + set buttons)
    const setsRow = document.createElement('div');
    setsRow.className = 'ex-sets';
    renderSets(setsRow, dayId, i, ex);
    card.appendChild(setsRow);

    exList.appendChild(card);
  });

  // Add button
  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = '+ Übung hinzufügen';
  addBtn.onclick = () => {
    data[dayId].push({ name: 'Neue Übung', kg: '0', sets: 3, pause: '90' });
    syncChecks(dayId);
    saveData(); saveChecks(); render();
  };
  exList.appendChild(addBtn);

  // Reset button
  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-btn';
  resetBtn.textContent = 'Tag zurücksetzen';
  resetBtn.onclick = () => {
    checks[dayId] = data[dayId].map(ex => Array.from({length: ex.sets}, () => ({done: false, reps: '', kg: ''})));
    saveChecks(); render();
  };
  exList.appendChild(resetBtn);

  main.appendChild(exList);
}

function renderSets(container, dayId, exIdx, ex) {
  container.innerHTML = '';
  for (let s = 0; s < ex.sets; s++) {
    const group = document.createElement('div');
    group.className = 'set-group';

    const label = document.createElement('span');
    label.className = 'set-label';
    label.textContent = 'S' + (s + 1);

    const setData = checks[dayId][exIdx] && checks[dayId][exIdx][s];

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'set-cb';
    cb.checked = setData && setData.done;

    const repsInp = document.createElement('input');
    repsInp.type = 'text';
    repsInp.inputMode = 'numeric';
    repsInp.className = 'set-reps';
    repsInp.placeholder = 'Wdh';
    repsInp.value = (setData && setData.reps) || '';

    const kgInp = document.createElement('input');
    kgInp.type = 'text';
    kgInp.inputMode = 'decimal';
    kgInp.className = 'set-kg';
    kgInp.placeholder = ex.kg || 'kg';
    kgInp.value = (setData && setData.kg) || '';

    let awaitingTimer = false;
    const startPendingTimer = () => {
      if (!awaitingTimer) return;
      awaitingTimer = false;
      const pauseSec = parseInt(ex.pause) || 60;
      timerStart(pauseSec, ex.name);
    };

    cb.onchange = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      checks[dayId][exIdx][s].done = cb.checked;
      saveChecks();
      if (cb.checked) {
        awaitingTimer = true;
        repsInp.focus();
        repsInp.select();
      } else {
        awaitingTimer = false;
      }
    };

    repsInp.oninput = () => {
      checks[dayId][exIdx][s].reps = repsInp.value;
      saveChecks();
    };
    repsInp.addEventListener('blur', startPendingTimer);
    repsInp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        repsInp.blur();
      }
    });

    kgInp.oninput = () => {
      checks[dayId][exIdx][s].kg = kgInp.value;
      saveChecks();
    };

    group.appendChild(label);
    group.appendChild(cb);
    group.appendChild(repsInp);
    group.appendChild(kgInp);
    container.appendChild(group);
  }

  // +/- set buttons
  const btns = document.createElement('span');
  btns.className = 'set-btns';

  const minus = document.createElement('button');
  minus.className = 'set-btn';
  minus.textContent = '−';
  minus.onclick = () => {
    if (ex.sets <= 1) return;
    ex.sets--;
    syncChecks(dayId);
    saveData(); saveChecks();
    // Update the sets input field if it exists
    const card = container.closest('.exercise');
    const setsInput = card.querySelectorAll('.field input')[1];
    if (setsInput) setsInput.value = ex.sets;
    renderSets(container, dayId, exIdx, ex);
  };

  const plus = document.createElement('button');
  plus.className = 'set-btn';
  plus.textContent = '+';
  plus.onclick = () => {
    if (ex.sets >= 20) return;
    ex.sets++;
    syncChecks(dayId);
    saveData(); saveChecks();
    const card = container.closest('.exercise');
    const setsInput = card.querySelectorAll('.field input')[1];
    if (setsInput) setsInput.value = ex.sets;
    renderSets(container, dayId, exIdx, ex);
  };

  btns.appendChild(minus);
  btns.appendChild(plus);
  container.appendChild(btns);
}

// ── Init ──
timerResume();
sessionResume();
render();
</script>
</body>
</html>
