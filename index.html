<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
:root{--bg-primary:#0a0a0f;--bg-card:#12121a;--bg-card-hover:#1a1a25;--bg-input:#0e0e16;--border:#1e1e2e;--accent:#6b8afd;--accent-dim:rgba(107,138,253,.12);--accent-glow:rgba(107,138,253,.25);--text-primary:#f0f0f0;--text-secondary:#6a6a80;--text-muted:#3a3a50;--success:#34d399;--success-dim:rgba(52,211,153,.15);--danger:#ef4444;--warn:#f5c16c;--warn-dim:rgba(245,193,108,.12);--radius:12px;--radius-sm:8px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;min-height:100dvh;overflow-x:hidden}
body.rest-locked{overflow:hidden!important;height:100vh;height:100dvh;touch-action:none}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(107,138,253,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(107,138,253,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 100px}
.sync-indicator{position:fixed;top:12px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:1px;padding:4px 12px;border-radius:20px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
.sync-indicator.saving{opacity:1;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(107,138,253,.2)}
.sync-indicator.saved{opacity:1;background:var(--success-dim);color:var(--success);border:1px solid rgba(52,211,153,.2)}
.header{padding:20px 0 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:1.3rem;letter-spacing:3px}
.workout-timer-display{font-family:'JetBrains Mono',monospace;font-size:.95rem;color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border);padding:6px 14px;border-radius:20px;letter-spacing:1px;transition:all .3s}
.workout-timer-display.active{color:var(--accent);border-color:var(--accent);box-shadow:0 0 15px var(--accent-dim)}

/* ── Bodyweight ─────────────────────────────────────── */
.bw-section{padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px}
.bw-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.bw-left{flex:1}
.bw-title{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:2px;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px}
.bw-input-row{display:flex;align-items:center;gap:8px}
.bw-input{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;width:88px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);padding:6px 10px;outline:none;-moz-appearance:textfield}
.bw-input:focus{border-color:var(--accent)}
.bw-input::-webkit-outer-spin-button,.bw-input::-webkit-inner-spin-button{-webkit-appearance:none}
.bw-kg{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--text-secondary)}
.btn-bw-save{padding:7px 14px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s}
.btn-bw-save:active{opacity:.7}
.bw-chart-wrap{flex-shrink:0;width:120px;height:48px;display:flex;align-items:center;justify-content:center}
.bw-stats{display:flex;gap:14px;flex-wrap:wrap}
.bw-stat{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text-muted);letter-spacing:.3px}
.bw-stat b{color:var(--text-secondary);font-weight:600}

/* ── Split selector ─────────────────────────────────── */
.split-selector{display:flex;gap:5px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.split-selector::-webkit-scrollbar{display:none}
.split-btn{flex-shrink:0;padding:10px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-secondary);font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .3s;text-align:center;line-height:1.3}
.split-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);box-shadow:0 0 20px var(--accent-dim)}
.split-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.workout-controls{display:flex;gap:8px;margin-bottom:20px}
.btn-workout{flex:1;padding:14px;border:1px solid var(--border);border-radius:var(--radius);font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s}
.btn-start{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-stop{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn-stop:disabled,.btn-start:disabled{opacity:.3;cursor:not-allowed}

/* ── Rest overlay ───────────────────────────────────── */
.rest-overlay{display:none;position:fixed;inset:0;background:#0a0a0f;z-index:1000;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.rest-overlay.visible{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.rest-label{font-family:'JetBrains Mono',monospace;font-size:.85rem;letter-spacing:4px;text-transform:uppercase;color:var(--text-secondary)}
.rest-progress-ring{width:220px;height:220px;position:relative}
.rest-progress-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.rest-progress-ring .bg{stroke:var(--border)}
.rest-progress-ring .fg{stroke:var(--accent);transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 8px var(--accent-glow))}
.rest-time-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rest-time-center .rest-time{font-family:'JetBrains Mono',monospace;font-size:3.2rem;font-weight:800;line-height:1;cursor:pointer}
.rest-time-center .rest-time:hover{color:var(--accent)}
.rest-time-center .rest-sublabel{font-size:.75rem;color:var(--text-secondary);letter-spacing:2px;margin-top:4px}
.rest-buttons{display:flex;gap:10px}
.btn-rest-action{padding:12px 28px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text-secondary);font-family:'Outfit',sans-serif;font-size:.85rem;cursor:pointer;transition:all .3s}
.btn-rest-action:hover{border-color:var(--accent);color:var(--accent)}
.rest-mini{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:var(--bg-card);border-top:2px solid var(--accent);padding:10px 16px;box-shadow:0 -4px 20px rgba(0,0,0,.5)}
.rest-mini.visible{display:flex;align-items:center;justify-content:space-between;animation:slideUpMini .3s ease}
@keyframes slideUpMini{from{transform:translateY(100%)}to{transform:translateY(0)}}
.rest-mini-left{display:flex;align-items:center;gap:10px}
.rest-mini-time{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent)}
.rest-mini-progress{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.rest-mini-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear}
.rest-mini-btns{display:flex;gap:8px}
.btn-mini{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;font-size:.7rem;cursor:pointer;transition:all .2s}
.btn-mini.expand{border-color:var(--accent);color:var(--accent)}

/* ── Exercise cards ─────────────────────────────────── */
.exercises-list{display:flex;flex-direction:column;gap:12px}
.swipe-wrapper{position:relative;overflow:hidden;border-radius:var(--radius)}
.swipe-delete-bg{position:absolute;top:0;right:0;bottom:0;width:80px;background:var(--danger);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:1px;font-weight:600;border-radius:0 var(--radius) var(--radius) 0;cursor:pointer}
.swipe-content{position:relative;z-index:1;transition:transform .3s ease;background:var(--bg-card);border-radius:var(--radius)}
.swipe-content.swiping{transition:none}
.swipe-content.swiped{transform:translateX(-80px)}
.exercise-card{border:1px solid var(--border);border-radius:var(--radius);transition:all .3s}
.exercise-card.completed{border-color:var(--success);box-shadow:0 0 15px var(--success-dim)}
.exercise-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.exercise-name-area{display:flex;align-items:center;gap:10px}
.exercise-name{font-weight:600;font-size:.95rem;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.exercise-name-input{font-weight:600;font-size:.95rem;font-family:'Outfit',sans-serif;background:var(--bg-input);border:1px solid var(--accent);border-radius:6px;color:var(--text-primary);padding:4px 8px;outline:none;width:100%;max-width:200px}
.exercise-meta{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:185px}
.exercise-badge{font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:2px 6px;border-radius:4px;letter-spacing:.5px}
.badge-weight{background:var(--accent-dim);color:var(--accent)}
.badge-progress{background:rgba(106,106,128,.15);color:var(--text-secondary)}
.badge-progress.done{background:var(--success-dim);color:var(--success)}
.badge-uni{background:var(--warn-dim);color:var(--warn);font-size:.6rem}
.badge-trend-up{background:rgba(52,211,153,.15);color:var(--success)}
.badge-trend-down{background:rgba(239,68,68,.12);color:var(--danger)}
.rest-type-badge{font-family:'JetBrains Mono',monospace;font-size:.5rem;padding:2px 5px;border-radius:3px;background:rgba(107,138,253,.08);color:var(--text-muted)}
.chevron{color:var(--text-muted);transition:transform .3s;font-size:.8rem;flex-shrink:0}
.exercise-card.open .chevron{transform:rotate(180deg)}
.exercise-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.exercise-card.open .exercise-body{max-height:1400px}
.exercise-body-inner{padding:0 16px 16px}
.move-buttons{display:flex;gap:4px}
.btn-move{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-move:disabled{opacity:.2;cursor:not-allowed}

/* ── Weight & Rest rows ─────────────────────────────── */
.weight-row,.rest-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:10px 12px;background:var(--bg-input);border-radius:var(--radius-sm);border:1px solid var(--border)}
.weight-label,.rest-row-label{font-size:.8rem;color:var(--text-secondary);letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.weight-adjuster,.rest-adjuster{display:flex;align-items:center;gap:12px}
.btn-adjust{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}
.weight-value{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem;width:70px;text-align:center;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--text-primary);padding:4px 6px;outline:none;-moz-appearance:textfield}
.weight-value:focus{border-color:var(--accent);background:var(--bg-card)}
.weight-value::-webkit-outer-spin-button,.weight-value::-webkit-inner-spin-button{-webkit-appearance:none}
.rest-sec-value{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem;width:60px;text-align:center;color:var(--accent);background:none;border:none;border-bottom:1px dashed rgba(107,138,253,.35);outline:none;cursor:text;padding:1px 2px}
.rest-sec-value:focus{border-bottom-color:var(--accent)}
.rest-time-edit-hint{font-size:.6rem;color:var(--text-muted);letter-spacing:1px;margin-top:4px;cursor:pointer;text-decoration:underline dotted}
.rest-edit-input{font-family:'JetBrains Mono',monospace;font-size:2.4rem;font-weight:800;width:140px;text-align:center;background:none;border:none;border-bottom:2px solid var(--accent);color:var(--text-primary);outline:none;display:none}
.rest-edit-hint{font-size:.65rem;color:var(--text-secondary);letter-spacing:1px;display:none;margin-top:6px}

/* ── Set rows ───────────────────────────────────────── */
.sets-container{display:flex;flex-direction:column;gap:6px}
.set-swipe-wrapper{position:relative;overflow:hidden;border-radius:var(--radius-sm)}
.set-delete-bg{position:absolute;top:0;right:0;bottom:0;width:60px;background:var(--danger);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem;font-family:'JetBrains Mono',monospace;font-weight:600;cursor:pointer;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.set-swipe-content{position:relative;z-index:1;transition:transform .3s ease;background:var(--bg-card)}
.set-swipe-content.swiping{transition:none}
.set-swipe-content.swiped{transform:translateX(-60px)}
.set-swipe-wrapper.set-done .set-delete-bg{display:none}
.set-swipe-wrapper.set-done .set-swipe-content{transform:none!important}
.set-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 10px;background:var(--bg-input);border-radius:var(--radius-sm);border:1px solid var(--border);transition:all .3s}
.set-row-end{display:flex;align-items:center;gap:6px;flex-shrink:0}
.set-row.bilateral-set-row .set-row-end{flex:0 0 100%;justify-content:flex-end;padding-left:28px}
.set-row.completed-set{border-color:var(--success);background:rgba(52,211,153,.03)}
/* Warmup set style */
.set-row.is-warmup{background:var(--warn-dim);border-color:rgba(245,193,108,.2)}
.set-row.is-warmup.completed-set{border-color:var(--success)}
.set-number{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text-muted);width:22px;text-align:center;cursor:pointer;user-select:none;transition:color .2s;flex-shrink:0}
.set-number.is-warmup{color:var(--warn)}
.set-row.completed-set .set-number{color:var(--success)}
.set-row-body{flex:1;display:flex;align-items:center;gap:6px}
.reps-adjuster{display:flex;align-items:center;gap:6px}
.reps-label{font-size:.7rem;color:var(--text-secondary);min-width:14px}
.btn-rep{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}
.reps-input{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:.85rem;width:34px;text-align:center;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text-primary);padding:2px 0;outline:none;-moz-appearance:textfield}
.reps-input:focus{border-color:var(--accent);background:var(--bg-card)}
.reps-input::-webkit-outer-spin-button,.reps-input::-webkit-inner-spin-button{-webkit-appearance:none}
.reps-separator{color:var(--text-muted);font-size:.7rem}
/* Previous reps hint – inline neben Reps-Adjuster */
.set-prev{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text-muted);letter-spacing:.2px;white-space:nowrap}
.btn-complete-set{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-complete-set.done{background:var(--success-dim);border-color:var(--success);color:var(--success);pointer-events:none}
.btn-complete-set.warmup-done{background:var(--warn-dim);border-color:var(--warn);color:var(--warn);pointer-events:none}
.btn-add-set-row{display:flex;gap:6px;margin-top:8px}
.btn-add-set{flex:1;padding:8px;border:1px dashed var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .2s}
.btn-add-set:hover{border-color:var(--accent);color:var(--accent)}
.btn-add-warmup{flex:1;padding:8px;border:1px dashed rgba(245,193,108,.4);border-radius:var(--radius-sm);background:transparent;color:var(--warn);font-family:'JetBrains Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .2s;opacity:.8}
.btn-add-warmup:hover{opacity:1;border-color:var(--warn)}
.warmup-weight-input{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;width:52px;text-align:center;background:var(--bg-input);border:1px solid rgba(245,193,108,.35);border-radius:5px;color:var(--warn);padding:3px 4px;outline:none;-moz-appearance:textfield}
.warmup-weight-input:focus{border-color:var(--warn)}
.warmup-weight-input::-webkit-outer-spin-button,.warmup-weight-input::-webkit-inner-spin-button{-webkit-appearance:none}
.warmup-weight-wrap{display:flex;align-items:center;gap:3px;margin-right:4px}
.warmup-weight-kg{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--warn);opacity:.7}
/* Per-Set Gewicht für Arbeitssätze */
.set-weight-wrap{display:flex;align-items:center;gap:3px;margin-right:4px}
.set-weight-input{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;width:52px;text-align:center;background:var(--bg-input);border:1px solid var(--border);border-radius:5px;color:var(--text-muted);padding:3px 4px;outline:none;-moz-appearance:textfield}
.set-weight-input:focus{border-color:var(--accent);color:var(--text-primary)}
.set-weight-input.dropped{color:var(--warn);border-color:rgba(245,193,108,.4);background:var(--warn-dim)}
.set-weight-input::-webkit-outer-spin-button,.set-weight-input::-webkit-inner-spin-button{-webkit-appearance:none}
.set-weight-kg{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text-muted);opacity:.7}
.uni-toggle{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;background:var(--bg-input);border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;user-select:none}
.uni-toggle-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-secondary)}
.uni-toggle-switch{width:34px;height:18px;border-radius:9px;background:var(--border);position:relative;transition:background .3s;flex-shrink:0}
.uni-toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text-muted);transition:all .3s}
.uni-toggle.active .uni-toggle-switch{background:var(--accent)}
.uni-toggle.active .uni-toggle-switch::after{left:18px;background:#fff}


.btn-add-exercise{width:100%;padding:16px;margin-top:12px;border:1px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--text-secondary);font-family:'Outfit',sans-serif;font-size:.9rem;cursor:pointer}

/* ── Modals ─────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,15,.9);z-index:900;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.modal-overlay.visible{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:90%;max-width:380px}
.modal h3{font-size:1rem;margin-bottom:16px;font-weight:600}
.modal-input{width:100%;padding:12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:.95rem;margin-bottom:10px;outline:none}

.history-section{margin-top:24px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius)}

.history-empty{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-muted);text-align:center;padding:12px}

/* ── Loading ────────────────────────────────────────── */
.loading-screen{position:fixed;inset:0;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;z-index:2000;transition:opacity .4s}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin:0 4px;animation:lp 1s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.15s}
.loading-dot:nth-child(3){animation-delay:.3s}
@keyframes lp{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

.rest-overlay.visible .rest-progress-ring{animation:pa 2s ease-in-out infinite;border-radius:50%}

@media(max-width:480px){.app{padding:0 12px 100px}.rest-time-center .rest-time{font-size:2.8rem}}


/* ── Progressive Overload Board ──────────────────────── */
.po-board{margin-top:24px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius)}

   ANIMATION & ALIGNMENT OVERRIDES
   Alle Overlays: display:none → opacity-basierte Übergänge
   damit Ein- UND Ausblenden animiert sind.
   ═══════════════════════════════════════════════════════ */

/* ── Neue keyframes ─────────────────────────────────── */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── Rest-Overlay ───────────────────────────────────── */
.rest-overlay{
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease;
}
.rest-overlay.visible{
  opacity:1;
  pointer-events:auto;
  animation:none; /* fadeIn-Animation deaktivieren – jetzt per transition */
}

/* ── Rest-Mini-Bar ──────────────────────────────────── */
.rest-mini{
  display:flex;
  align-items:center;
  justify-content:space-between;
  opacity:0;
  pointer-events:none;
  transform:translateY(100%);
  transition:opacity .25s ease, transform .3s cubic-bezier(0.4,0,0.2,1);
}
.rest-mini.visible{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

/* ── Modal Overlay ──────────────────────────────────── */
.modal-overlay{
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
}
.modal-overlay.visible{
  opacity:1;
  pointer-events:auto;
}
/* Panel skaliert beim Einblenden */
.modal{
  transform:scale(.95) translateY(-8px);
  transition:transform .25s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.visible .modal{
  transform:scale(1) translateY(0);
}

/* ── Confirm Overlay ────────────────────────────────── */
.confirm-overlay{
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
}
.confirm-overlay.visible{
  opacity:1;
  pointer-events:auto;
}
.confirm-modal{
  transform:scale(.95) translateY(-8px);
  transition:transform .25s cubic-bezier(0.4,0,0.2,1);
}
.confirm-overlay.visible .confirm-modal{
  transform:scale(1) translateY(0);
}

/* ── Übungskarte: Aufklapp-Animation ────────────────── */
.exercise-body{
  opacity:0;

}
.exercise-card.open .exercise-body{

}

function fmtRest(sec) {
  if (sec < 60) return `${sec}s`;
  const m = Math.floor(sec / 60), s = sec % 60;
  return s ? `${m}:${String(s).padStart(2, '0')}` : `${m}m`;
}
function fmtRestFull(sec) {
  if (sec < 60) return `${sec}s`;
  const m = Math.floor(sec / 60), s = sec % 60;
  return s ? `${m}:${s.toString().padStart(2, '0')}` : `${m}:00`;
}

// SVG sparkline used for bodyweight + volume charts
function svgSparkline(values, width, height, strokeColor, uid) {
  if (!values || values.length < 2) return '';
  const pad = 6;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => [
    pad + (i / (values.length - 1)) * (width - pad * 2),
    pad + (1 - (v - min) / range) * (height - pad * 2)
  ]);
  const poly = pts.map(p => p.join(',')).join(' ');
  const area = `M${pts[0][0]},${height} ` + pts.map(p => `L${p.join(',')}`).join(' ') + ` L${pts[pts.length-1][0]},${height}Z`;
  const last = pts[pts.length - 1];
  const gid = `g_${uid}`;
  return `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${strokeColor}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${strokeColor}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <polyline points="${poly}" fill="none" stroke="${strokeColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="${strokeColor}"/>
  </svg>`;
}

async function saveWorkoutSessionToCloud(entry) {

}

async function syncFromCloud() {
  if (!sb) return;
  let changed = false;

  // ── Workout-Verlauf ───────────────────────────────────────────
  try {
    const { data: sessions, error } = await sb
      .from('workout_sessions')
      .select('id, date, split, duration, total_sets, total_volume, workout_exercises(name, weight, weights, weight_dropped, sets_done, sets_total, volume)')
      .order('date', { ascending: false })
      .limit(50);
    if (!error && sessions) {
      const cloudHistory = sessions.map(s => ({
        date: s.date, split: s.split, duration: s.duration,
        totalSets: s.total_sets, totalVolume: s.total_volume,
        exercises: (s.workout_exercises || []).map(ex => ({
          name: ex.name, weight: ex.weight, weights: ex.weights,
          weightDropped: ex.weight_dropped, done: ex.sets_done, total: ex.sets_total, volume: ex.volume
        }))
      }));
      const localHistory = loadWorkoutHistory();
      const cloudDates = new Set(cloudHistory.map(h => h.date));
      // Lokale Einträge die noch nicht in der Cloud sind → hochladen
      for (const e of localHistory.filter(h => !cloudDates.has(h.date))) {
        await saveWorkoutSessionToCloud(e);
      }
      // Merge: Cloud + lokale Extras, nach Datum sortiert
      const localOnly = localHistory.filter(h => !cloudDates.has(h.date));
      const merged = [...cloudHistory, ...localOnly]
        .sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 50);
      try { localStorage.setItem('gym_history', JSON.stringify(merged)); } catch(e) {}
      changed = true;
    }
  } catch(e) { console.error('History sync:', e); }

  // ── Körpergewicht ─────────────────────────────────────────────
  try {
    const { data: bwRows, error } = await sb
      .from('bodyweight_logs').select('date, weight').order('date', { ascending: true });
    if (!error && bwRows) {
      const cloudBW = bwRows.map(d => ({ date: d.date, weight: d.weight }));
      const localBW = loadBodyWeightData();
      const cloudDates = new Set(cloudBW.map(d => d.date));
      for (const e of localBW.filter(d => !cloudDates.has(d.date))) {
        await saveBodyWeightToCloud(e.date, e.weight);
      }
      const localOnly = localBW.filter(d => !cloudDates.has(d.date));
      const merged = [...cloudBW, ...localOnly].sort((a, b) => a.date.localeCompare(b.date));
      try { localStorage.setItem('gym_bodyweight', JSON.stringify(merged)); } catch(e) {}
      changed = true;
    }
  } catch(e) { console.error('BW sync:', e); }

  // ── Vorherige Session (für Reps-Hints) ───────────────────────
  try {
    const { data, error } = await sb.from('workouts').select('data').eq('id', 'prev_sessions').single();
    if (!error && data) {
      const cloudPrev = JSON.parse(data.data);
      // Cloud-Splits haben Vorrang; lokale Splits die in Cloud fehlen bleiben erhalten
      prevSession = { ...prevSession, ...cloudPrev };
      try { localStorage.setItem('gym_prev_session', JSON.stringify(prevSession)); } catch(e) {}
    }
  } catch(e) {}

  if (changed) {
    renderHistory();
    renderExerciseProgressBoard();
    renderBodyWeight();
  }
}

async function loadExercises(split) {
  const cd = await loadFromCloud(split);
  const src = cd || DEFAULT_DATA[split];
  exercises = src.map(ex => {
    const u = ex.unilateral || false;
    let reps;
    if (u) reps = ex.sets.map(s => Array.isArray(s) ? { l: s[0] || 8, r: s[1] || 8 } : { l: s || 8, r: s || 8 });
    else reps = ex.sets.map(r => Array.isArray(r) ? r[0] : (r || 8));
    return {
      name: ex.name, weight: ex.weight, unilateral: u,
      restSec: ex.restSec || DEFAULT_REST, reps,
      completedSets: ex.sets.map(() => false),
      warmupSets: ex.sets.map((_, i) => (ex.warmupSets || [])[i] || false),
      setWeights: ex.sets.map((_, i) => (ex.setWeights || [])[i] ?? null)
    };
  });
}

function getTrendBadge(xi) {
  const ex = exercises[xi];
  const prev = prevSession[currentSplit]?.[ex.name];
  if (!prev) return '';
  const diff = +(ex.weight - prev.weight).toFixed(2);
  if (diff === 0) return '';
  const abs = Math.abs(diff), display = abs % 1 === 0 ? abs : abs.toFixed(1);
  return diff > 0
    ? `<span class="exercise-badge badge-trend-up">↑${display}</span>`
    : `<span class="exercise-badge badge-trend-down">↓${display}</span>`;
}

function getPrevRepsStr(exName, si, unilateral) {
  const prev = prevSession[currentSplit]?.[exName]?.reps?.[si];

  if (unilateral && typeof prev === 'object') return `↩<span class="set-prev-val">${prev.l}/${prev.r}</span>`;

// ── Swipe ────────────────────────────────────────────────────────

function initSwipe() {
  document.querySelectorAll('.swipe-wrapper').forEach(wrapper => {
    const el = wrapper.querySelector('.swipe-content');
    const th = 80; let sx = 0, sy = 0, cx = 0, sw = false;
    el.addEventListener('touchstart', e => {
      if (e.target.closest('.btn-rep,.btn-complete-set,.btn-adjust,.btn-move,.btn-add-set,.btn-add-warmup,.weight-value,.reps-input,.uni-toggle,.set-number,.warmup-weight-input')) return;
      const card = el.querySelector('.exercise-card');
      if (card && card.classList.contains('open')) return;
      sx = e.touches[0].clientX; sy = e.touches[0].clientY; cx = 0; sw = false;
    }, { passive: true });
    el.addEventListener('touchmove', e => {
      const card = el.querySelector('.exercise-card');
      if (card && card.classList.contains('open')) return;
      const dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
      if (!sw && Math.abs(dy) > Math.abs(dx)) return;
      if (dx < -10) { sw = true; el.classList.add('swiping'); cx = Math.max(-th, dx); el.style.transform = `translateX(${cx}px)`; }
    }, { passive: true });
    el.addEventListener('touchend', () => {
      el.classList.remove('swiping'); el.style.transform = '';
      if (cx < -th * .5) { el.classList.add('swiped'); setTimeout(() => el.classList.remove('swiped'), 3000); }
      else el.classList.remove('swiped'); sw = false;
    });
  });
  document.querySelectorAll('.set-swipe-wrapper').forEach(wrapper => {
    const el = wrapper.querySelector('.set-swipe-content');
    const th = 60; let sx = 0, sy = 0, cx = 0, sw = false;
    el.addEventListener('touchstart', e => {
      if (e.target.closest('.btn-rep,.btn-complete-set,.reps-input,.set-number')) return;
      const card = wrapper.closest('.exercise-card');
      if (!card || !card.classList.contains('open')) return;
      sx = e.touches[0].clientX; sy = e.touches[0].clientY; cx = 0; sw = false;
    }, { passive: true });
    el.addEventListener('touchmove', e => {
      const card = wrapper.closest('.exercise-card');
      if (!card || !card.classList.contains('open')) return;
      const dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
      if (!sw && Math.abs(dy) > Math.abs(dx)) return;
      if (dx < -10) { sw = true; el.classList.add('swiping'); cx = Math.max(-th, dx); el.style.transform = `translateX(${cx}px)`; }
    }, { passive: true });
    el.addEventListener('touchend', () => {
      el.classList.remove('swiping'); el.style.transform = '';
      if (cx < -th * .5) { el.classList.add('swiped'); setTimeout(() => el.classList.remove('swiped'), 3000); }
      else el.classList.remove('swiped'); sw = false;
    });
  });
}

function aW(i, d) {

function sW(i, v) {

function aRest(xi, delta) {
  const cur = exercises[xi].restSec || DEFAULT_REST;
  let idx = REST_STEPS.indexOf(cur);
  if (idx === -1) idx = REST_STEPS.findIndex(s => s >= cur);
  if (idx === -1) idx = REST_STEPS.length - 1;
  exercises[xi].restSec = REST_STEPS[Math.max(0, Math.min(REST_STEPS.length - 1, idx + delta))];
  const w = document.querySelectorAll('.swipe-wrapper')[xi];
  const rv = w?.querySelector('.rest-sec-value');
  if (rv) rv.value = fmtRestFull(exercises[xi].restSec);
  updHead(xi); debouncedSave();
}

function parseRestInput(val) {
  const s = val.trim();
  // Accept "m:ss", "mm:ss", or plain seconds
  let result = null;
  if (s.includes(':')) {
    const [m, sec] = s.split(':').map(Number);
    if (!isNaN(m) && !isNaN(sec)) result = m * 60 + sec;
  } else {
    const n = parseInt(s);
    if (!isNaN(n)) result = n;
  }
  return result !== null && result >= 0 ? result : null;
}

function setRestDirect(xi, val) {

  const w = document.querySelectorAll('.swipe-wrapper')[xi];
  const rv = w?.querySelector('.rest-sec-value');
  if (secs === null || secs < 5 || secs > 600) {
    if (rv) rv.value = fmtRestFull(exercises[xi].restSec || DEFAULT_REST);
    return;
  }
  exercises[xi].restSec = secs;
  if (rv) rv.value = fmtRestFull(secs);
  updHead(xi); debouncedSave();
}

function cSet(xi, si) {

function addSet(i) {
  const ex = exercises[i];
  if (!ex.setWeights) ex.setWeights = ex.reps.map(() => null); // init vor dem Push
  if (ex.unilateral) ex.reps.push({ l: 8, r: 8 }); else ex.reps.push(8);
  ex.completedSets.push(false);
  ex.warmupSets.push(false);
  ex.setWeights.push(null);

  document.querySelectorAll('.swipe-wrapper')[i]?.querySelector('.exercise-card')?.classList.add('open');
  debouncedSave();

function addWarmupSet(i) {
  const ex = exercises[i];
  // Insert warmup sets before working sets (find last warmup index)
  let insertAt = 0;
  for (let s = 0; s < ex.warmupSets.length; s++) {
    if (ex.warmupSets[s]) insertAt = s + 1;
  }
  const defaultWarmupWeight = Math.round(ex.weight * 0.5 / 2.5) * 2.5 || Math.round(ex.weight * 0.5);
  if (!ex.setWeights) ex.setWeights = ex.reps.map(() => null); // init vor dem Splice
  if (ex.unilateral) ex.reps.splice(insertAt, 0, { l: 10, r: 10 });
  else ex.reps.splice(insertAt, 0, 10);
  ex.completedSets.splice(insertAt, 0, false);
  ex.warmupSets.splice(insertAt, 0, true);
  ex.setWeights.splice(insertAt, 0, defaultWarmupWeight);
  renderExercises();
  document.querySelectorAll('.swipe-wrapper')[i]?.querySelector('.exercise-card')?.classList.add('open');
  debouncedSave();
}

function sSetWeight(xi, si, val) {
  const ex = exercises[xi];
  if (!ex.setWeights) ex.setWeights = ex.reps.map(() => null);
  const v = parseFloat(val);
  const parsed = isNaN(v) || val.trim() === '' ? null : Math.max(0, +v.toFixed(2));
  const newW = (parsed !== null && Math.abs(parsed - ex.weight) < 0.01) ? null : parsed;
  const oldW = ex.setWeights[si];
  ex.setWeights[si] = newW;
  // Cascade: alle nachfolgenden Working-Sets mit gleichem alten Gewicht übernehmen
  for (let j = si + 1; j < ex.setWeights.length; j++) {
    if (ex.warmupSets[j]) continue;
    if (ex.setWeights[j] === oldW) {
      ex.setWeights[j] = newW;
      const jinp = document.getElementById(`sw-${xi}-${j}`);
      if (jinp) {
        jinp.value = newW !== null ? newW : ex.weight;
        jinp.classList.toggle('dropped', newW !== null && newW < ex.weight);
      }
    } else break;
  }
  const inp = document.getElementById(`sw-${xi}-${si}`);
  if (inp) inp.classList.toggle('dropped', ex.setWeights[si] !== null && ex.setWeights[si] < ex.weight);
  debouncedSave();
}

function delSet(xi, si) {

  exercises[xi].reps.splice(si, 1);
  exercises[xi].completedSets.splice(si, 1);

// ── Workout ──────────────────────────────────────────────────────

function startWorkout() {
  workoutActive = true; workoutStartTime = Date.now();
  document.querySelectorAll('.split-btn').forEach(b => b.disabled = true);
  exercises.forEach(ex => {
    ex.completedSets = ex.completedSets.map(() => false);
    // don't reset warmupSets — they're part of the template
  });
  renderExercises();
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('summary').classList.remove('visible');
  document.getElementById('workoutTimerDisplay').classList.add('active');
  updateWD(); workoutTimerInterval = setInterval(updateWD, 500);
}

function updateWD() {
  const e = Math.floor((Date.now() - workoutStartTime) / 1000);
  const t = `${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;
  document.getElementById('workoutTimerDisplay').textContent = t;
  document.title = `⏱ ${t} – GYM`;
}

function stopWorkout(show = true) {
  workoutActive = false;
  clearInterval(workoutTimerInterval); clearInterval(restTimerInterval);
  document.getElementById('workoutTimerDisplay').classList.remove('active');
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  document.querySelectorAll('.split-btn').forEach(b => b.disabled = false);
  document.title = 'GYM';
  document.getElementById('restOverlay').classList.remove('visible');
  document.getElementById('restMini').classList.remove('visible');
  document.body.classList.remove('rest-locked');
  restMinimized = false;
  if (show) {
    savePrevSession();
    saveWorkoutHistory();
    showSummary();
    logStreak();
    renderHistory();
    renderExerciseProgressBoard();
  }
}

function fmtVolume(v) {
  const r = Math.round(v);
  if (r >= 1000) return (r / 1000).toFixed(1) + ' t';
  return r + ' kg';
}

function showSummary() {
  const e = Math.floor((Date.now() - (workoutStartTime || Date.now())) / 1000);
  let ts = 0, tv = 0;
  exercises.forEach(ex => ex.completedSets.forEach((d, i) => {
    if (d && !ex.warmupSets[i]) {
      ts++;
      const w = ex.setWeights?.[i] ?? ex.weight;
      tv += w * (ex.unilateral ? (ex.reps[i].l + ex.reps[i].r) / 2 : ex.reps[i]);
    }
  }));
  document.getElementById('summaryTime').textContent = `${Math.floor(e/60)} min`;
  document.getElementById('summarySets').textContent = ts;
  document.getElementById('summaryVolume').textContent = fmtVolume(tv);
  document.getElementById('summary').classList.add('visible');
}


// ── Rest timer ───────────────────────────────────────────────────

function startRest(dur) {
  clearInterval(restTimerInterval);
  restStartTime = Date.now(); currentRestDuration = dur || DEFAULT_REST;
  restTimeLeft = currentRestDuration; restMinimized = false;
  document.getElementById('restOverlay').classList.add('visible');
  document.getElementById('restMini').classList.remove('visible');
  document.body.classList.add('rest-locked');
  updateRD(); restTimerInterval = setInterval(updateRD, 500);
}
function updateRD() {
  const e = Math.floor((Date.now() - restStartTime) / 1000), rem = Math.max(0, currentRestDuration - e);
  restTimeLeft = rem;
  const p = rem / currentRestDuration, c = 628.32;
  document.getElementById('restTimeDisplay').textContent = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
  document.getElementById('restRingFg').style.strokeDashoffset = c * (1 - p);
  document.getElementById('restMiniTime').textContent = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
  document.getElementById('restMiniBar').style.width = `${p * 100}%`;
  if (rem <= 0) {
    clearInterval(restTimerInterval);
    document.getElementById('restOverlay').classList.remove('visible');
    document.getElementById('restMini').classList.remove('visible');
    document.body.classList.remove('rest-locked'); restMinimized = false;
    try { navigator.vibrate && navigator.vibrate([300,150,300,150,300]); } catch(e) {}
    try {
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination); o.frequency.value = 880; g.gain.value = 0.3; o.start(); o.stop(ac.currentTime + 0.3);
      setTimeout(() => { const o2 = ac.createOscillator(), g2 = ac.createGain(); o2.connect(g2); g2.connect(ac.destination); o2.frequency.value = 880; g2.gain.value = 0.3; o2.start(); o2.stop(ac.currentTime + 0.3); }, 500);
    } catch(e) {}
    try { if ('Notification' in window && Notification.permission === 'granted') new Notification('Pause vorbei!', { body: 'Nächstes Set!', tag: 'gym-rest', renotify: true }); } catch(e) {}
  }
}
function minimizeRest() { restMinimized = true; document.getElementById('restOverlay').classList.remove('visible'); document.getElementById('restMini').classList.add('visible'); document.body.classList.remove('rest-locked'); }
function expandRest() { restMinimized = false; document.getElementById('restMini').classList.remove('visible'); document.getElementById('restOverlay').classList.add('visible'); document.body.classList.add('rest-locked'); }
function skipRest() { clearInterval(restTimerInterval); document.getElementById('restOverlay').classList.remove('visible'); document.getElementById('restMini').classList.remove('visible'); document.body.classList.remove('rest-locked'); restMinimized = false; }

function loadAllPrevSessions() {

function savePrevSession() {
  const snap = {};
  exercises.forEach(ex => {
    // Nur Arbeitssatz-Reps speichern (keine Warmup-Sets)
    // → verhindert Index-Verschiebung wenn Warmup-Sets hinzugefügt/entfernt werden
    const workingReps = ex.reps
      .filter((_, i) => !ex.warmupSets[i])
      .map(r => ex.unilateral ? { l: r.l, r: r.r } : r);

// ── Bodyweight tracking ──────────────────────────────────────────

function loadBodyWeightData() {
  try {
    const raw = JSON.parse(localStorage.getItem('gym_bodyweight') || '[]');
    // Nur gültige Einträge: Gewicht zwischen 20 und 500 kg
    return raw
      .map(d => ({ date: d.date, weight: parseFloat(d.weight) }))
      .filter(d => d.date && !isNaN(d.weight) && d.weight >= 20 && d.weight <= 500);
  } catch(e) { return []; }
}
function saveBodyWeight(weight) {
  const w = parseFloat(weight);
  if (isNaN(w) || w < 20 || w > 500) return; // Ungültige Werte ignorieren
  const data = loadBodyWeightData();
  const today = new Date().toISOString().split('T')[0];
  const idx = data.findIndex(d => d.date === today);
  if (idx >= 0) data[idx].weight = w; else data.push({ date: today, weight: w });
  data.sort((a, b) => a.date.localeCompare(b.date));
  try { localStorage.setItem('gym_bodyweight', JSON.stringify(data)); } catch(e) {}
  saveBodyWeightToCloud(today, w); // Async fire-and-forget
  renderBodyWeight();
}
function renderBodyWeight() {
  const data = loadBodyWeightData();
  const today = new Date().toISOString().split('T')[0];
  const todayEntry = data.find(d => d.date === today);
  const inp = document.getElementById('bwInput');
  if (inp && todayEntry) inp.value = parseFloat(todayEntry.weight).toFixed(1);

  const last14 = data.filter(d => (Date.now() - new Date(d.date).getTime()) / 86400000 <= 14);
  const statsEl = document.getElementById('bwStats');
  const chartEl = document.getElementById('bwChartSvg');

  if (last14.length > 0) {
    const weights = last14.map(d => d.weight);
    const hi = Math.max(...weights), lo = Math.min(...weights);
    const avg = weights.reduce((a, b) => a + b, 0) / weights.length;
    const fmtKg = n => (+n).toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    const trend = last14.length >= 2 ? last14[last14.length-1].weight - last14[0].weight : null;
    const trendHtml = trend !== null
      ? `<span class="bw-stat" style="color:${trend > 0 ? 'var(--danger)' : trend < 0 ? 'var(--success)' : 'var(--text-muted)'}">
          ${trend >= 0 ? '+' : ''}${fmtKg(trend)} kg <b>Trend</b></span>`
      : '';
    statsEl.innerHTML = `
      <span class="bw-stat">▲ <b>${fmtKg(hi)}</b></span>
      <span class="bw-stat">▼ <b>${fmtKg(lo)}</b></span>
      <span class="bw-stat">⌀ <b>${fmtKg(avg)}</b></span>
      ${trendHtml}`;
  } else {
    statsEl.innerHTML = '<span class="bw-stat">Noch keine Einträge</span>';
  }

  if (chartEl) {
    if (last14.length >= 2) {
      chartEl.innerHTML = svgSparkline(last14.map(d => d.weight), 120, 48, '#6b8afd', 'bw');
    } else {
      chartEl.innerHTML = '';
    }
  }
}

// ── Workout history ──────────────────────────────────────────────

function saveWorkoutHistory() {
  const duration = Math.floor((Date.now() - workoutStartTime) / 1000);
  let totalSets = 0, totalVolume = 0;
  const exSnap = exercises.map(ex => {
    const cc = ex.completedSets.filter((d, i) => d && !ex.warmupSets[i]).length;
    let vol = 0;
    // Alle Arbeitssatz-Gewichte (auch nicht abgeschlossene für Pattern-Tracking)
    const workingWeights = ex.reps.map((_, i) => i)
      .filter(i => !ex.warmupSets[i])
      .map(i => ex.setWeights?.[i] ?? ex.weight);
    const topWeight = workingWeights.length ? Math.max(...workingWeights) : ex.weight;
    // Volumen mit per-Set Gewicht berechnen
    ex.completedSets.forEach((done, i) => {
      if (done && !ex.warmupSets[i]) {
        const w = ex.setWeights?.[i] ?? ex.weight;
        vol += w * (ex.unilateral ? (ex.reps[i].l + ex.reps[i].r) / 2 : ex.reps[i]);
      }
    });
    totalSets += cc; totalVolume += vol;
    // Prüfen ob alle Arbeitssätze dasselbe Gewicht hatten
    const weightDropped = workingWeights.some(w => w < topWeight);
    return {
      name: ex.name,
      weight: topWeight,           // Top-Set-Gewicht für Progress-Tracking
      weights: workingWeights,     // Per-Set Array (z.B. [32.5, 30, 30])
      weightDropped,
      done: cc,
      total: ex.completedSets.filter((_, i) => !ex.warmupSets[i]).length,
      volume: Math.round(vol)
    };
  });
  if (totalSets === 0) return; // Leeres Workout nicht speichern
  const entry = { date: new Date().toISOString(), split: currentSplit, duration, totalSets, totalVolume: Math.round(totalVolume), exercises: exSnap };
  const history = loadWorkoutHistory();
  history.unshift(entry);
  if (history.length > 50) history.splice(50);
  try { localStorage.setItem('gym_history', JSON.stringify(history)); } catch(e) {}
  saveWorkoutSessionToCloud(entry); // Async fire-and-forget
}
function loadWorkoutHistory() { try { return JSON.parse(localStorage.getItem('gym_history') || '[]'); } catch(e) { return []; } }
function renderHistory() {
  const history = loadWorkoutHistory();
  const el = document.getElementById('historyList');
  if (!history.length) { el.innerHTML = '<div class="history-empty">Noch keine Trainings</div>'; return; }
  el.innerHTML = history.slice(0, 8).map(h => {
    const d = new Date(h.date);
    const dateStr = d.toLocaleDateString('de', { day: '2-digit', month: '2-digit', year: '2-digit' });
    const timeStr = d.toLocaleTimeString('de', { hour: '2-digit', minute: '2-digit' });
    const exList = h.exercises.map(ex => {
      const wtStr = ex.weights && ex.weightDropped
        ? ex.weights.join('→') + 'kg'
        : `${ex.weight}kg`;
      return `<div class="history-ex-item"><span>${ex.name}</span><span>${ex.done}/${ex.total} × ${wtStr}</span></div>`;
    }).join('');
    return `<div class="history-entry" onclick="this.classList.toggle('expanded')">
      <div class="history-entry-header">
        <span class="history-entry-split">${h.split.toUpperCase()}</span>
        <span class="history-entry-date">${dateStr} ${timeStr}</span>
      </div>
      <div class="history-entry-stats">
        <span class="history-stat">${h.duration < 60 ? '<1' : Math.floor(h.duration/60)}min</span>
        <span class="history-stat">${h.totalSets} Sets</span>
        <span class="history-stat">${fmtVolume(h.totalVolume)}</span>
      </div>
      <div class="history-entry-exercises">${exList}</div>
    </div>`;
  }).join('');
}

// ── Streak ───────────────────────────────────────────────────────

function getWK(d) {
  const t = new Date(d); t.setHours(0, 0, 0, 0);
  const dow = t.getDay() || 7; // Mo=1 … So=7
  t.setDate(t.getDate() + 4 - dow); // auf Donnerstag der ISO-Woche setzen
  const yearStart = new Date(t.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((t - yearStart) / 864e5 + 1) / 7);
  return `${t.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}
function getMon(d) {
  const t = new Date(d), dy = t.getDay();
  t.setDate(t.getDate() - dy + (dy === 0 ? -6 : 1)); t.setHours(0,0,0,0); return t;
}
function loadSD() { try { return JSON.parse(localStorage.getItem('gym_streak') || '{}'); } catch(e) { return {}; } }
function saveSD(d) { try { localStorage.setItem('gym_streak', JSON.stringify(d)); } catch(e) {} }
function logStreak() {
  const today = new Date().toISOString().split('T')[0], wk = getWK(new Date()), d = loadSD();
  if (!d[wk]) d[wk] = [];
  if (!d[wk].includes(today)) { d[wk].push(today); saveSD(d); }
  renderStreak();
}
function calcStreak() {
  const d = loadSD(), cwk = getWK(new Date()); let s = 0;
  const mon = getMon(new Date());
  for (let i = 1; i < 52; i++) {
    const cd = new Date(mon); cd.setDate(cd.getDate() - (i * 7));
    if ((d[getWK(cd)] || []).length >= streakGoal) s++; else break;
  }
  if ((d[cwk] || []).length >= streakGoal) s++;
  return s;
}
function renderStreak() {
  const d = loadSD(), cwk = getWK(new Date()), tw = d[cwk] || [], s = calcStreak();
  document.getElementById('streakNumber').textContent = s;
  document.querySelectorAll('.streak-goal-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.goal) === streakGoal));
  const pe = document.getElementById('weekProgress');
  let dh = '';
  for (let i = 0; i < streakGoal; i++) {
    const f = i < tw.length;
    dh += `<div class="week-dot ${f?'filled':''} ${tw.length>=streakGoal?'current-week-complete':''}">${f?'✓':(i+1)}</div>`;
  }
  pe.innerHTML = dh;
  const rem = Math.max(0, streakGoal - tw.length);
  const ie = document.getElementById('weekInfo');
  if (rem === 0) { ie.textContent = 'Diese Woche geschafft!'; ie.style.color = 'var(--success)'; }
  else { ie.textContent = `Noch ${rem} diese Woche`; ie.style.color = 'var(--text-muted)'; }
  const he = document.getElementById('streakHistory');
  let ph = '';
  const mon = getMon(new Date());
  for (let i = 7; i >= 0; i--) {
    const cd = new Date(mon); cd.setDate(cd.getDate() - (i * 7));
    const wk = getWK(cd), cnt = (d[wk] || []).length;
    let cl = 'streak-week-pip';
    if (cnt >= streakGoal) cl += ' done'; else if (cnt > 0) cl += ' partial';
    if (i === 0) cl += ' current';
    ph += `<div class="${cl}" title="Week ${wk}: ${cnt}/${streakGoal}"></div>`;
  }
  he.innerHTML = ph;
}
function loadStreakGoal() { try { return parseInt(localStorage.getItem('gym_streak_goal')) || 4; } catch(e) { return 4; } }
function setStreakGoal(n) { streakGoal = n; localStorage.setItem('gym_streak_goal', n); renderStreak(); }


// ── Progressive Overload Board ───────────────────────────────────

function renderExerciseProgressBoard() {
  const el = document.getElementById('poBoardList');
  if (!el) return;

  const history = loadWorkoutHistory();
  const splitSessions = history.filter(h => h.split === currentSplit);
  if (splitSessions.length < 2) {
    el.innerHTML = `<div class="po-empty">Noch keine ${currentSplit.toUpperCase()}-Verlaufsdaten – mindestens 2 Workouts nötig</div>`;
    return;
  }

  // Sammle Gewichtsverlauf pro Übung – nur Sessions des aktuellen Splits
  const exMap = {};
  for (const session of splitSessions) {
    for (const ex of (session.exercises || [])) {
      if (!exMap[ex.name]) exMap[ex.name] = [];
      exMap[ex.name].push({ date: session.date, weight: ex.weight, done: ex.done, total: ex.total });
    }
  }

  const rows = Object.entries(exMap)
    .filter(([, sessions]) => sessions.length >= 2)
    .map(([name, sessions]) => {
      const weights = sessions.map(s => s.weight); // neueste zuerst
      const current = weights[0];
      const sessionsAtCurrent = sessions.filter(s => Math.abs(s.weight - current) < 0.005).length;

      // Letzter Gewichtsanstieg suchen
      let lastChangeText = '';
      for (let i = 1; i < weights.length; i++) {
        const diff = +(current - weights[i]).toFixed(2);
        if (Math.abs(diff) >= 0.01) {
          const sign = diff > 0 ? '+' : '';
          lastChangeText = `${sign}${diff}kg vor ${i} Session${i > 1 ? 's' : ''}`;
          break;
        }
      }

      // Status: Steigung in letzten 4 Sessions
      const recent = weights.slice(0, Math.min(4, weights.length));
      const first = recent[recent.length - 1];
      const last  = recent[0];
      const status = last > first ? 'up' : last < first ? 'down' : 'flat';

      // Sparkline-Werte (älteste→neueste, max 8)
      const sparkVals = weights.slice(0, 8).reverse();

      const metaText = lastChangeText
        ? `${current} kg · ${lastChangeText}`
        : `${current} kg · ${sessionsAtCurrent} Session${sessionsAtCurrent > 1 ? 's' : ''} auf diesem Gewicht`;

      return { name, sessions, sparkVals, current, status, metaText };
    })
    .sort((a, b) => new Date(b.sessions[0].date) - new Date(a.sessions[0].date))
    .slice(0, 15);

  if (!rows.length) {
    el.innerHTML = '<div class="po-empty">Noch keine Verlaufsdaten</div>';
    return;
  }

  const colors = { up: '#34d399', flat: '#f5c16c', down: '#ef4444' };
  const labels = { up: '↑ Steigt', flat: '→ Plateau', down: '↓ Rückgang' };

  el.innerHTML = rows.map(r => {
    const sparkHtml = r.sparkVals.length >= 2
      ? svgSparkline(r.sparkVals, 80, 32, colors[r.status], 'po_' + r.name.replace(/\W/g, '_'))
      : '';
    return `<div class="po-exercise-row">
      <div class="po-ex-info">
        <div class="po-ex-name">${r.name}</div>
        <div class="po-ex-meta">${r.metaText}</div>
      </div>
      <div class="po-ex-chart">${sparkHtml}</div>
      <div class="po-badge ${r.status}">${labels[r.status]}</div>
    </div>`;
  }).join('');
}

// ── Event listeners ──────────────────────────────────────────────

function setupEventListeners() {
  document.querySelectorAll('.split-btn').forEach(b => b.addEventListener('click', () => switchSplit(b.dataset.split)));
  document.getElementById('btnStart').addEventListener('click', startWorkout);
  document.getElementById('btnStop').addEventListener('click', () => stopWorkout(true));
  document.getElementById('btnSkipRest').addEventListener('click', skipRest);
  document.getElementById('btnMinimize').addEventListener('click', minimizeRest);
  document.getElementById('btnExpand').addEventListener('click', expandRest);
  document.getElementById('btnMiniSkip').addEventListener('click', skipRest);
  let restEditConfirmed = false;
  document.getElementById('restEditInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { restEditConfirmed = true; exitRestEditMode(true); }
    if (e.key === 'Escape') { restEditConfirmed = true; exitRestEditMode(false); }
  });
  document.getElementById('restEditInput').addEventListener('blur', () => {
    const wasConfirmed = restEditConfirmed;
    restEditConfirmed = false;
    if (!wasConfirmed) exitRestEditMode(true);
  });
  document.getElementById('btnAddExercise').addEventListener('click', openModal);
  document.getElementById('btnModalCancel').addEventListener('click', closeModal);
  document.getElementById('btnModalConfirm').addEventListener('click', confirmAdd);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.getElementById('inputExSets').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAdd(); });
  document.getElementById('btnConfirmCancel').addEventListener('click', closeConfirm);
  document.getElementById('btnConfirmOk').addEventListener('click', okConfirm);
  document.getElementById('confirmOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });
  // Bodyweight
  const saveBw = () => { const v = parseFloat(document.getElementById('bwInput').value); if (!isNaN(v) && v > 0) saveBodyWeight(v); };
  document.getElementById('btnSaveBw').addEventListener('click', saveBw);
  document.getElementById('bwInput').addEventListener('keydown', e => { if (e.key === 'Enter') saveBw(); });
  // Visibility change (tab switch, sleep)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) { if (workoutActive) updateWD(); if (restStartTime && restTimeLeft > 0) updateRD(); }
  });
}

init();
